  - id: val-acct-002
    family: account_lookup
    user_input: "Is customer C-302 active? What plan are they on?"
    fixture_state: {}
    expected_tool_calls: [get_customer]
    forbidden_tool_calls: [escalate_incident]
    expected_facts:
      tier: premium
      status: active
