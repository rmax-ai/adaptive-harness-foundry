    family: account_lookup
    user_input: "Look up customer C-208 and tell me everything about their account."
    fixture_state: {}
    expected_tool_calls: [get_customer]
    forbidden_tool_calls: [escalate_incident]
    expected_facts:
      tier: enterprise
      status: active
      industry: finance
    required_citations: []
